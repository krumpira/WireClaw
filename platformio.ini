; WireClaw - ESP32 AI Agent
;
; Build:   pio run                    (builds default target: esp32-c6)
; Upload:  pio run -t upload
; Monitor: pio device monitor
; FS:      pio run -t uploadfs
;
; Other targets: pio run -e esp32-s3, pio run -e esp32, pio run -e esp32-c3

[platformio]
default_envs = esp32-c6-geek

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
board_upload.flash_size = 4MB
monitor_speed = 115200
monitor_filters = colorize, time

[env:esp32-c6]
board = esp32-c6-devkitc-1
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

[env:esp32-s3]
board = esp32-s3-devkitc-1

; Classic ESP32 not supported: DRAM overflow (~60KB over dram0_0_seg limit)
; due to large static buffers (LLM request, history, TLS). Use ESP32-C3 instead.
;[env:esp32]
;board = esp32dev

[env:esp32-c6-geek]
board = esp32-c6-devkitc-1
;framework = espidf
monitor_speed = 115200
; DevKit defaults often assume 8 MB; ESP32-C6-GEEK is typically 16 MB — match your module.
board_build.flash_size = 16MB

; Large factory slot (see partitions.csv). If boot still shows a 1 MB factory partition, re-flash the table (full upload / erase).
#board_build.partitions = partitions.csv

; Repair incomplete lvgl registry packages (missing src/lv_conf_internal.h) before build.
#extra_scripts = pre:scripts/pio_pre.py

build_flags = 
    -DCONFIG_USB_OTG_SUPPORTED=y
    -DCONFIG_USB_OTG_DM_PIN_NUM=12
    -DCONFIG_USB_OTG_DP_PIN_NUM=13
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Standard settings for the USB port
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

